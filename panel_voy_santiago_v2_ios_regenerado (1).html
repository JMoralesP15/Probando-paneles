  <style>
    :root{
      --bg: #0b1220;
      --panel: rgba(255,255,255,0.06);
      --panel2: rgba(255,255,255,0.09);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.68);
      --line: rgba(255,255,255,0.14);
      --voy-blue: #0B4DA2;
      --voy-orange: #F36B21;
      --voy-red: #D62828;
      --ist-purple: #5B2A86;
      --p-blue: rgba(11,77,162,0.22);
      --p-orange: rgba(243,107,33,0.22);
      --p-red: rgba(214,40,40,0.20);
      --p-purple: rgba(91,42,134,0.22);
      --p-green: rgba(32,164,121,0.20);
      --ok: #20A479;
      --warn: #F5B301;
      --bad: #D62828;
      --shadow: 0 14px 40px rgba(0,0,0,0.35);
      --radius: 18px;
      --radius2: 14px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }
    [data-theme="light"]{
      --bg: #f6f7fb;
      --panel: rgba(0,0,0,0.04);
      --panel2: rgba(0,0,0,0.06);
      --text: rgba(0,0,0,0.88);
      --muted: rgba(0,0,0,0.62);
      --line: rgba(0,0,0,0.12);
      --shadow: 0 14px 40px rgba(0,0,0,0.12);
    }
    *{ box-sizing: border-box; margin:0; padding:0; }
    body{
      font-family: var(--font);
      color: var(--text);
      background: radial-gradient(1200px 900px at 20% 10%, rgba(11,77,162,0.22), transparent 60%),
                  radial-gradient(900px 800px at 80% 15%, rgba(243,107,33,0.18), transparent 55%),
                  radial-gradient(900px 900px at 70% 90%, rgba(91,42,134,0.14), transparent 55%),
                  var(--bg);
      min-height: 100vh;
    }
    .app{
      display: grid;
      grid-template-columns: 268px 1fr;
      min-height: 100vh;
    }
    /* SIDEBAR */
    .sidebar{
      border-right: 1px solid var(--line);
      padding: 16px 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent 60%);
      position: sticky; top:0; height: 100vh; overflow: auto;
    }
    .brand{
      display:flex; align-items:center; gap:10px; padding:10px;
      border-radius: var(--radius); background: rgba(255,255,255,0.04);
      border: 1px solid var(--line); box-shadow: var(--shadow);
    }
    .brand-logo{
      width:36px; height:36px; border-radius:10px;
      background: linear-gradient(135deg, var(--voy-blue), var(--voy-orange));
      display:flex; align-items:center; justify-content:center;
      font-weight:800; font-size:14px; color:#fff; flex-shrink:0;
    }
    .brand-text b{ font-size:13px; display:block; }
    .brand-text span{ font-size:11px; color:var(--muted); }
    .ist-badge{
      margin-top:8px; padding:6px 10px; border-radius:10px;
      background:var(--p-purple); border:1px solid rgba(91,42,134,0.35);
      font-size:11px; color:var(--muted); text-align:center;
    }
    .ist-badge b{ color:var(--text); }
    .nav{ margin-top:12px; display:flex; flex-direction:column; gap:5px; }
    .nav button{
      width:100%; text-align:left; border:1px solid transparent;
      background:transparent; color:var(--text); padding:9px 10px;
      border-radius:12px; cursor:pointer;
      display:flex; align-items:center; justify-content:space-between;
      transition: all .15s ease; font-size:13px;
    }
    .nav button:hover{ background:rgba(255,255,255,0.05); border-color:var(--line); }
    .nav button.active{
      background:linear-gradient(90deg, var(--p-blue), transparent 70%);
      border-color:rgba(11,77,162,0.35); box-shadow:0 8px 20px rgba(0,0,0,0.18);
    }
    .nav small{ color:var(--muted); font-size:10.5px; }
    .nav-icon{ width:22px; height:22px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; margin-right:8px; }
    .nav-label{ display:flex; align-items:center; }
    .side-filters{ margin-top:14px; }
    .side-filters label{ font-size:11px; color:var(--muted); margin-bottom:4px; display:block; }
    .filter-chips{ display:flex; flex-wrap:wrap; gap:5px; }
    .chip{
      border:1px solid var(--line); background:rgba(255,255,255,0.04);
      color:var(--muted); padding:5px 10px; border-radius:20px;
      cursor:pointer; font-size:11px; transition:all .15s;
    }
    .chip.active{ background:var(--voy-blue); color:#fff; border-color:var(--voy-blue); }
    .side-date{ margin-top:14px; font-size:11px; color:var(--muted); text-align:center; }
    .side-actions{ margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    .chipbtn{
      border:1px solid var(--line); background:rgba(255,255,255,0.04);
      color:var(--text); padding:8px; border-radius:12px;
      cursor:pointer; font-size:11px; text-align:center; transition:all .15s;
    }
    .chipbtn:hover{ background:rgba(255,255,255,0.08); }

    /* MAIN CONTENT */
    .main{ padding:20px; overflow:auto; }
    .content{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .col{ display:flex; flex-direction:column; gap:16px; }
    .col.full{ grid-column:1/-1; }

    /* CARDS */
    .card{
      background:var(--panel); border:1px solid var(--line);
      border-radius:var(--radius); overflow:hidden;
      box-shadow: var(--shadow);
    }
    .card .hd{
      padding:14px 16px 10px; border-bottom:1px solid var(--line);
      background:var(--panel2);
    }
    .card .hd b{ font-size:14px; display:block; }
    .card .hd span{ font-size:12px; color:var(--muted); }
    .card .bd{ padding:16px; }

    /* KPIs */
    .kpis{ display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; }
    .kpi{
      background:var(--panel2); border:1px solid var(--line);
      border-radius:var(--radius2); padding:12px;
    }
    .kpi .n{ font-size:26px; font-weight:700; line-height:1; }
    .kpi .t{ font-size:11px; color:var(--muted); margin-top:4px; }
    .kpi .tag{ display:inline-block; margin-top:6px; font-size:10px; padding:2px 7px; border-radius:20px; background:var(--p-blue); color:var(--text); }

    /* TABLE */
    .table{ width:100%; border-collapse:collapse; font-size:12px; }
    .table th, .table td{ padding:8px 10px; border-bottom:1px solid var(--line); text-align:left; vertical-align:middle; }
    .table th{ color:var(--muted); font-weight:600; font-size:11px; }
    .table tr:hover td{ background:rgba(255,255,255,0.03); }
    .table-wrap{ overflow-x:auto; }

    /* PILLS & DOTS */
    .pill{
      display:inline-flex; align-items:center; gap:5px;
      padding:3px 9px; border-radius:20px;
      background:rgba(255,255,255,0.07); font-size:11px;
    }
    .dot{ width:7px; height:7px; border-radius:50%; display:inline-block; }
    .dot.ok, .dot.bajo{ background:var(--ok); }
    .dot.warn, .dot.medio{ background:var(--warn); }
    .dot.bad, .dot.alto{ background:var(--bad); }
    .dot.nd{ background:var(--muted); }
    .dot.blue{ background:var(--voy-blue); }
    .dot.orange{ background:var(--voy-orange); }

    /* PROGRESS BAR */
    .prog-wrap{ background:rgba(255,255,255,0.08); border-radius:20px; height:6px; overflow:hidden; min-width:60px; }
    .prog-fill{ height:100%; border-radius:20px; transition:width .4s; }

    /* DOC GRID */
    .doc-grid{ display:flex; gap:3px; flex-wrap:wrap; }
    .doc-dot{ width:10px; height:10px; border-radius:2px; cursor:default; }

    /* BADGES */
    .badge{
      display:inline-block; padding:3px 8px; border-radius:8px;
      font-size:11px; font-weight:600;
    }
    .badge-e1{ background:rgba(91,42,134,0.25); color:#c49bff; }
    .badge-e2{ background:rgba(243,107,33,0.25); color:#ffb37c; }
    .badge-e3{ background:rgba(245,179,1,0.25); color:#ffe080; }
    .badge-e4{ background:rgba(32,164,121,0.25); color:#7dffd4; }
    .badge-e5{ background:rgba(11,77,162,0.25); color:#7ec3ff; }
    .badge-e6{ background:rgba(11,77,162,0.35); color:#b0d9ff; }
    .badge-e7{ background:rgba(32,164,121,0.35); color:#a0ffdf; }
    .badge-nd{ background:rgba(255,255,255,0.08); color:var(--muted); }
    .badge-riesgo-bajo{ background:rgba(32,164,121,0.25); color:#7dffd4; }
    .badge-riesgo-medio{ background:rgba(245,179,1,0.25); color:#ffe080; }
    .badge-riesgo-alto{ background:rgba(214,40,40,0.25); color:#ffb0b0; }
    .badge-proceso{ background:rgba(243,107,33,0.25); color:#ffb37c; }
    .badge-nd{ background:rgba(255,255,255,0.08); color:var(--muted); }

    /* ALERTS */
    .alert{
      padding:10px 12px; border-radius:12px; font-size:12px;
      border:1px solid; margin-bottom:8px; display:flex; align-items:flex-start; gap:8px;
    }
    .alert.warn{ background:rgba(245,179,1,0.12); border-color:rgba(245,179,1,0.35); }
    .alert.bad{ background:rgba(214,40,40,0.1); border-color:rgba(214,40,40,0.3); }
    .alert.ok{ background:rgba(32,164,121,0.1); border-color:rgba(32,164,121,0.3); }
    .alert.info{ background:rgba(11,77,162,0.12); border-color:rgba(11,77,162,0.35); }

    /* HR & GRID */
    .hr{ border:none; border-top:1px solid var(--line); margin:14px 0; }
    .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .grid3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
    .reco{ background:rgba(11,77,162,0.12); border:1px solid rgba(11,77,162,0.3); border-radius:10px; padding:10px; font-size:12px; margin-top:8px; }

    /* CANVAS */
    canvas{ max-width:100%; }

    /* DRAWER */
    .drawer{
      position:fixed; right:-420px; top:0; width:420px; height:100vh;
      background: linear-gradient(160deg, rgba(11,29,64,0.98), rgba(11,18,32,0.98));
      border-left:1px solid var(--line); z-index:200;
      transition:right .28s cubic-bezier(.4,0,.2,1);
      display:flex; flex-direction:column; overflow:hidden;
    }
    .drawer.open{ right:0; }
    .drawer .hd{ padding:16px; border-bottom:1px solid var(--line); flex-shrink:0; }
    .drawer .bd{ flex:1; overflow-y:auto; padding:16px; }
    .drawer .close{ border:1px solid var(--line); background:rgba(255,255,255,0.06); color:var(--text); padding:6px 12px; border-radius:8px; cursor:pointer; font-size:12px; }

    /* RADAR */
    .radar-wrap{ position:relative; width:100%; max-width:320px; margin:0 auto; }

    /* TABS within a card */
    .inner-tabs{ display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
    .inner-tab{
      border:1px solid var(--line); background:rgba(255,255,255,0.04);
      color:var(--muted); padding:5px 12px; border-radius:20px;
      cursor:pointer; font-size:11.5px; transition:all .15s;
    }
    .inner-tab.active{ background:var(--voy-blue); color:#fff; border-color:var(--voy-blue); }

    /* HEATMAP */
    .heatmap{ display:grid; gap:2px; }
    .hm-cell{
      padding:6px 4px; border-radius:4px; font-size:10px;
      text-align:center; color:#fff; font-weight:600;
    }

    /* VIGILANCIA CARD */
    .vcard{
      background:var(--panel2); border:1px solid var(--line);
      border-radius:14px; padding:14px; margin-bottom:10px;
    }
    .vcard.active{ border-color:rgba(245,179,1,0.5); background:rgba(245,179,1,0.07); }
    .vcard.closed{ border-color:rgba(32,164,121,0.4); background:rgba(32,164,121,0.06); }

    @media (max-width: 980px){
      .app{ grid-template-columns:1fr; }
      .sidebar{ position:relative; height:auto; }
      .content{ grid-template-columns:1fr; }
      .grid2, .grid3{ grid-template-columns:1fr; }
    }
  

    /* iOS / Safari mobile tweaks */
    html{ -webkit-text-size-adjust:100%; }
    body{ overscroll-behavior-y:none; padding-left:env(safe-area-inset-left); padding-right:env(safe-area-inset-right); padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom); }
    .main, .sidebar, .drawer .bd, .table-wrap{ -webkit-overflow-scrolling:touch; }
    canvas{ max-width:100% !important; height:auto !important; }
    input, select, button, .chip{ touch-action:manipulation; }

    @supports (height: 100dvh){
      body, .app{ min-height:100dvh; }
      .sidebar{ min-height:100dvh; height:100dvh; }
      .drawer{ height:100dvh; }
    }

    @media (max-width: 980px){
      body{ background-attachment:scroll; }
      .sidebar{ position:relative; top:auto; height:auto; min-height:unset; padding:calc(12px + env(safe-area-inset-top)) 12px 12px; }
      .main{ padding:12px; overflow:visible; }
      .content{ gap:12px; }
      .card .bd{ padding:14px; }
      .kpis{ grid-template-columns:repeat(2, minmax(0,1fr)); }
      .side-actions{ grid-template-columns:1fr 1fr; }
      .nav button{ padding:11px 10px; }
      .drawer{ width:100vw; max-width:100vw; right:-100vw; border-left:none; }
      .drawer.open{ right:0; }
      .drawer .hd{ padding-top:calc(14px + env(safe-area-inset-top)); }
      .drawer .bd{ padding-bottom:calc(16px + env(safe-area-inset-bottom)); }
      .table-wrap{ margin:0 -4px; padding:0 4px 2px; }
      .table th, .table td{ white-space:nowrap; }
      .radar-wrap{ max-width:100%; }
    }

    @media (max-width: 640px){
      .brand{ padding:12px; }
      .brand-logo{ width:40px; height:40px; }
      .content, .grid2, .grid3, .side-actions{ grid-template-columns:1fr !important; }
      .kpis{ grid-template-columns:1fr 1fr; }
      .card .hd b{ font-size:15px; }
      .card .hd span, .table, .muted{ font-size:12px; }
      .chipbtn, .chip{ min-height:40px; display:flex; align-items:center; justify-content:center; }
      .nav small{ display:none; }
    }

    @media print{
      body{ padding:0 !important; }
    }

  </style>
</head>

<div class="app">

  </aside>

  <!-- MAIN -->
  <main class="main">

</div>

<!-- DRAWER -->
<div class="drawer" id="drawer">

      </div>
      <button class="close" id="drawerClose">✕ Cerrar</button>
    </div>
  </div>
  <div class="bd" id="drawerBody"></div>
</div>

   UTILITIES
=================================================== */
const $ = id => document.getElementById(id);

function fmtDate(s){
  if(!s) return '—';
  const d = new Date(s);
  if(isNaN(d)) return s;
  return d.toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'});
}

function riskColor(r){
  if(!r) return 'nd';
  const t = r.toLowerCase();
  if(t.includes('bajo')) return 'ok';
  if(t.includes('medio')) return 'warn';
  if(t.includes('alto')) return 'bad';
  if(t.includes('proceso')) return 'orange';
  return 'nd';
}

function riskBadge(r){
  if(!r) return '<span class="badge badge-nd">Sin dato</span>';
  const t = r.toLowerCase();
  if(t.includes('bajo')) return `<span class="badge badge-riesgo-bajo">Riesgo Bajo</span>`;
  if(t.includes('medio')) return `<span class="badge badge-riesgo-medio">Riesgo Medio</span>`;
  if(t.includes('alto')) return `<span class="badge badge-riesgo-alto">Riesgo Alto</span>`;
  if(t.includes('proceso')) return `<span class="badge badge-proceso">En Proceso</span>`;
  return `<span class="badge badge-nd">Sin dato</span>`;
}

function etapaBadge(e){
  if(!e) return '<span class="badge badge-nd">Sin etapa</span>';
  return `<span class="badge badge-e${e}">Etapa ${e}</span>`;
}

function progBar(pct, color='#0B4DA2'){
  const p = pct||0;
  return `<div class="prog-wrap"><div class="prog-fill" style="width:${p}%;background:${color};"></div></div>`;
}

function docDots(docs){
  return docs.map((v,i)=>{
    const color = v===1?'#20A479': v===0.5?'#F5B301':'rgba(255,255,255,0.15)';
    const title = DOCS_LABELS[i] + (v===1?' ✓':v===0.5?' (parcial)':' (pendiente)');
    return `<div class="doc-dot" style="background:${color}" title="${title}"></div>`;
  }).join('');
}

function docPct(docs){
  const s = docs.reduce((a,b)=>a+(b||0),0);
  return Math.round(s/docs.length*100);
}

function getFiltered(arr){ return arr.filter(c=>state.rsFilter==='all'||c.rs===state.rsFilter); }

function destroyChart(id){
  if(chartInstances[id]){ chartInstances[id].destroy(); delete chartInstances[id]; }
}

function mkChart(id, cfg){
  destroyChart(id);
  const canvas = $(id);
  if(!canvas) return;
  chartInstances[id] = new Chart(canvas, cfg);
}

function card(title, subtitle, body){
  return `<div class="card"><div class="hd"><b>${title}</b>${subtitle?`<br/><span>${subtitle}</span>`:''}</div><div class="bd">${body}</div></div>`;
}

function renderAlertas(cs, dps){
  const alerts = [];
  cs.filter(c=>c.part!=null&&c.part<60).forEach(c=>
    alerts.push({tipo:'warn',msg:`<b>${c.name}</b>: participación baja (${c.part}%) — requiere sensibilización`})
  );
  cs.filter(c=>c.vigilancia==='Sí').forEach(c=>
    alerts.push({tipo:'warn',msg:`<b>${c.name}</b>: en vigilancia IST activa — verificar cumplimiento de plazos`})
  );
  if(dps.filter(d=>d.estado==='ABIERTO').length>0)
    alerts.push({tipo:'bad',msg:`<b>${dps.filter(d=>d.estado==='ABIERTO').length} DIEP abiertos</b> requieren cierre EPT`});
  cs.filter(c=>c.etapa===1||c.etapa===null).slice(0,3).forEach(c=>
    alerts.push({tipo:'info',msg:`<b>${c.name}</b> (${c.rs==='voy15'?'VOY 15':c.rs==='voy14'?'VOY 14':'VOY SpA'}): pendiente inicio o en Etapa 1 — priorizar constitución CdA`})
  );
  alerts.push({tipo:'ok',msg:`<b>${cs.filter(c=>c.riesgo&&c.riesgo.toLowerCase().includes('bajo')).length} centros</b> con riesgo bajo confirmado en evaluación CEAL-SM`});
  return card('Alertas de Seguimiento','Acciones prioritarias identificadas',
    alerts.map(a=>`<div class="alert ${a.tipo}"><span>${a.tipo==='warn'?'⚠️':a.tipo==='bad'?'🔴':a.tipo==='ok'?'✅':'ℹ️'}</span><span>${a.msg}</span></div>`).join('')

}

function renderHeatmap(){
  const centros = Object.keys(CEAL_DIMS);
  const dims = ['CT','EM','DP','RC','CR','QL','CM','IT','TV','CJ','VU','VA','GHQ'];
  const colW = `${100/(centros.length+1)}%`;

  function heatColor(val){
    // 0% = transparent, 50%+ = red
    const alpha = Math.min(val/50, 1);
    const r = Math.round(214 + (255-214)*0);
    const g = Math.round(40 * (1-alpha) + 100*0);
    const b = Math.round(40 * (1-alpha));
    return `rgba(214,${Math.round(40*(1-alpha))},${Math.round(40*(1-alpha))},${0.15+alpha*0.6})`;
  }

  let html = `<div style="overflow-x:auto;"><table class="table" style="font-size:10.5px;min-width:500px;">
    <thead><tr>
      <th style="white-space:nowrap">Dimensión</th>
      ${centros.map(k=>`<th style="white-space:nowrap;text-align:center">${k.replace('_',' ')}</th>`).join('')}
    </tr></thead>
    <tbody>`;

  dims.forEach(d=>{
    html += `<tr><td><b title="${DIMS_FULL[d]}">${d}</b><span style="font-size:9px;color:var(--muted);display:block;">${DIMS_FULL[d]}</span></td>`;
    centros.forEach(k=>{
      const ev = CEAL_DIMS[k];
      const dim = ev.dims.find(x=>x.d===d);
      const val = dim?dim.a:null;
      html += val!=null
        ? `<td style="text-align:center;background:${heatColor(val)};border-radius:4px;"><b>${val.toFixed(1)}%</b></td>`
        : `<td style="text-align:center;color:var(--muted)">—</td>`;
    });
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  return html;
}

function renderDimRanking(){
  const dims = ['CT','EM','DP','RC','CR','QL','CM','IT','TV','CJ','VU','VA','GHQ'];
  const avgs = dims.map(d=>{
    const vals = Object.values(CEAL_DIMS).map(ev=>{ const x=ev.dims.find(v=>v.d===d); return x?x.a:null; }).filter(v=>v!=null);
    return { d, avg: vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0, full:DIMS_FULL[d] };
  }).sort((a,b)=>b.avg-a.avg);

  return `<div style="display:flex;flex-direction:column;gap:6px;">
    ${avgs.map((x,i)=>{
      const color = x.avg>30?'var(--bad)':x.avg>20?'var(--warn)':'var(--ok)';
      return `<div style="display:flex;align-items:center;gap:8px;">

        <span style="font-size:11px;font-weight:700;color:${color};width:40px;text-align:right;">${x.avg.toFixed(1)}%</span>
        <span style="font-size:10px;color:var(--muted);flex:1;">${x.full}</span>

    }).join('')}

}

  const hist = state.rsFilter==='all'?CEAL_HISTORY:CEAL_HISTORY.filter(h=>h.rs===state.rsFilter);
  const grouped = {};
  hist.forEach(h=>{ (grouped[h.centro]=grouped[h.centro]||[]).push(h); });

  return `<div class="table-wrap"><table class="table">
    <thead><tr><th>Centro</th><th>Eval</th><th>Fecha</th><th>N</th><th>Part.</th><th>Riesgo</th><th>Tendencia</th></tr></thead>
    <tbody>
      ${Object.entries(grouped).flatMap(([centro, evals])=>
        evals.sort((a,b)=>a.eval_n-b.eval_n).map((e,i,arr)=>{
          const prev = arr[i-1];
          const trend = prev ? (e.part>prev.part?`<span style="color:var(--ok)">↑ +${e.part-prev.part}pp</span>`
            :e.part<prev.part?`<span style="color:var(--bad)">↓ ${e.part-prev.part}pp</span>`:'=') : '—';
          return `<tr>
            <td><b>${centro}</b></td>
            <td>Eval ${e.eval_n}</td>
            <td style="font-size:11px;">${fmtDate(e.fecha)}</td>
            <td style="font-size:11px;">${e.universo}</td>
            <td><span style="font-weight:600;color:${e.part<60?'var(--bad)':e.part<70?'var(--warn)':'var(--ok)'}">${e.part}%</span></td>
            <td>${riskBadge(null)}</td>
            <td style="font-size:12px;">${trend}</td>
          </tr>`;
        })
      ).join('')}
    </tbody>
  </table></div>`;
}

/* ===================================================
   DRAWER – DETALLE CENTRO
=================================================== */
function openDrawer(name){
  const c = CENTROS.find(x=>x.name===name);
  if(!c) return;
  $('drawerTitle').textContent = c.name;
  $('drawerSubtitle').textContent = `${c.rsName} · ${c.comuna||'Sin comuna'} · ${c.masa?c.masa+' trabajadores':'masa N/D'}`;

  const cealEvs = CEAL_HISTORY.filter(h=>h.centro===c.name).sort((a,b)=>a.eval_n-b.eval_n);
  const diep = DIEP_DATA.filter(d=>d.centro===c.name);
  const vig = VIGILANCIAS.filter(v=>v.ct.toLowerCase().includes(c.name.toLowerCase().split(' ')[0]));

  // Check if we have dims data
  const dimKeys = Object.keys(CEAL_DIMS).filter(k=>k.startsWith(c.name.replace(' ','_')||c.name));
  const hasDims = dimKeys.length > 0;

  $('drawerBody').innerHTML = `
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
      ${etapaBadge(c.etapa)} ${riskBadge(c.riesgo)}
      ${c.vigilancia==='Sí'?'<span class="pill"><span class="dot warn"></span>En vigilancia</span>':''}
      ${c.cuv?`<span class="pill">CUV: ${c.cuv}</span>`:''}
    </div>

    <b style="font-size:12px;color:var(--muted)">Documentación legal</b>
    <div style="margin:8px 0 12px;display:flex;flex-direction:column;gap:4px;">
      ${c.docs.map((v,i)=>`
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="color:${v===1?'var(--ok)':v===0.5?'var(--warn)':'rgba(255,255,255,0.2)'};font-size:14px;">${v===1?'●':v===0.5?'◐':'○'}</span>
          <span style="font-size:11px;color:${v===0?'var(--muted)':'var(--text)'};">${DOCS_LABELS[i]}</span>
        </div>
      `).join('')}
    </div>
    <div style="font-size:12px;font-weight:700;">Avance: ${docPct(c.docs)}%</div>
    ${progBar(docPct(c.docs),'#0B4DA2')}

    ${cealEvs.length>0?`
      <hr class="hr"/>
      <b style="font-size:12px;color:var(--muted)">Evaluaciones CEAL-SM</b>
      <div style="margin-top:8px;">
        ${cealEvs.map(e=>`
          <div style="background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:6px;">
            <div style="display:flex;justify-content:space-between;">
              <b>Eval ${e.eval_n} — ${fmtDate(e.fecha)}</b>
              <span class="pill"><span class="dot ${e.estado==='Concluido'?'ok':'warn'}"></span>${e.estado}</span>
            </div>
            <div style="font-size:12px;margin-top:4px;">
              N: ${e.universo} · Participación: <b style="color:${e.part<60?'var(--bad)':e.part<70?'var(--warn)':'var(--ok)'}">${e.part}%</b>
            </div>
          </div>
        `).join('')}
      </div>
    `:''}

    ${hasDims?`
      <hr class="hr"/>
      <b style="font-size:12px;color:var(--muted)">Resultados por Dimensión</b>
      <canvas id="drawerRadar" height="260" style="margin-top:10px;"></canvas>
    `:''}

    ${vig.length>0?`
      <hr class="hr"/>
      <b style="font-size:12px;color:var(--muted)">Vigilancia IST</b>
      ${vig.map(v=>`
        <div class="vcard ${v.vigente==='SI'?'active':'closed'}" style="margin-top:8px;">
          <b>${v.factor}</b><br/>
          <span style="font-size:11px;color:var(--muted)">${v.etapa} · ${fmtDate(v.fecha)}</span><br/>
          <a href="${v.link}" target="_blank" style="color:var(--voy-blue);font-size:11px;">📁 Drive →</a>
        </div>
      `).join('')}
    `:''}

    ${diep.length>0?`
      <hr class="hr"/>
      <b style="font-size:12px;color:var(--muted)">DIEP registrados</b>
      ${diep.map(d=>`<div style="font-size:11px;padding:4px 0;">${d.fecha} · ${d.diag} · ${d.gen||'—'} · <span style="color:${d.estado==='ABIERTO'?'var(--bad)':'var(--ok)'}">${d.estado}</span></div>`).join('')}
    `:''}
  `;

  // Init drawer radar if dims exist
  if(hasDims){
    setTimeout(()=>{ initDrawerRadar(c.name, dimKeys); }, 80);
  }

  const drawer = $('drawer');
  drawer.classList.add('open');
}

function initDrawerRadar(centerName, keys){
  const dims = ['CT','EM','DP','RC','CR','QL','CM','IT','TV','CJ','VU','VA','GHQ'];
  destroyChart('drawerRadar');
  const canvas = $('drawerRadar');
  if(!canvas) return;

  const datasets = keys.map((k,i)=>{
    const ev = CEAL_DIMS[k];
    const data = dims.map(d=>{ const x=ev.dims.find(v=>v.d===d); return x?x.a:0; });
    const colors = ['rgba(214,40,40,0.6)','rgba(243,107,33,0.6)'];
    return {
      label: k.replace(centerName.replace(' ','_')+'_','Eval ').replace(centerName+'_','Eval '),
      data, fill:true,
      backgroundColor: colors[i]||'rgba(11,77,162,0.3)',
      borderColor: colors[i]||'rgba(11,77,162,0.8)',
      borderWidth:2, pointRadius:3
    };
  });

  chartInstances['drawerRadar'] = new Chart(canvas, {
    type:'radar',
    data:{ labels: dims.map(d=>d), datasets },
    options:{
      responsive:true, scales:{ r:{ min:0, max:60, ticks:{color:'rgba(255,255,255,0.4)',font:{size:9}}, grid:{color:'rgba(255,255,255,0.1)'}, pointLabels:{color:'rgba(255,255,255,0.8)',font:{size:10}} }},
      plugins:{ legend:{ labels:{color:'rgba(255,255,255,0.8)',font:{size:10}} } }
    }
  });
}

/* ===================================================
   INIT CHARTS
=================================================== */
function initCharts(){
  const cs = getFiltered(CENTROS);
  const dps = DIEP_DATA.filter(d=>state.rsFilter==='all'||d.rs===state.rsFilter);

  // ---- Chart: Participación por centro ----
  if($('chartPart')){
    const csPart = getFiltered(CENTROS).filter(c=>c.part!=null).sort((a,b)=>b.part-a.part);
    mkChart('chartPart',{
      type:'bar',
      data:{
        labels: csPart.map(c=>c.name),
        datasets:[{ label:'Participación %', data:csPart.map(c=>c.part),
          backgroundColor: csPart.map(c=>c.part<60?'rgba(214,40,40,0.7)':c.part<70?'rgba(245,179,1,0.7)':'rgba(32,164,121,0.7)'),
          borderRadius:6 }]
      },
      options:{ responsive:true, plugins:{legend:{display:false}},
        scales:{ y:{min:0,max:100,ticks:{color:'rgba(255,255,255,0.5)',font:{size:10}}, grid:{color:'rgba(255,255,255,0.07)'}},
          x:{ticks:{color:'rgba(255,255,255,0.6)',font:{size:10}}, grid:{color:'rgba(255,255,255,0.05)'}} },
        plugins:{ tooltip:{ callbacks:{ label:(c)=>`${c.raw}%` } } }
      }
    });
  }

  // ---- Chart: RS ----
  if($('chartRS')){
    const rsMap={'voy4':'VOY SpA','voy14':'VOY 14','voy15':'VOY 15'};
    const rsCounts={'voy4':0,'voy14':0,'voy15':0};
    cs.forEach(c=>rsCounts[c.rs]=(rsCounts[c.rs]||0)+1);
    mkChart('chartRS',{ type:'doughnut',
      data:{ labels:Object.values(rsMap), datasets:[{ data:Object.values(rsCounts),
        backgroundColor:['rgba(11,77,162,0.8)','rgba(243,107,33,0.8)','rgba(91,42,134,0.8)'],
        borderWidth:0 }]},
      options:{ responsive:true, plugins:{ legend:{ position:'bottom', labels:{color:'rgba(255,255,255,0.7)',font:{size:10},boxWidth:10} } } }
    });
  }

  // ---- Chart: Riesgo ----
  if($('chartRiesgo')){
    const bajo=cs.filter(c=>c.riesgo&&c.riesgo.toLowerCase().includes('bajo')).length;
    const proceso=cs.filter(c=>c.etapa&&c.etapa<=3&&!c.riesgo).length;
    const nd=cs.filter(c=>!c.riesgo&&!c.etapa).length;
    mkChart('chartRiesgo',{ type:'doughnut',
      data:{ labels:['Riesgo Bajo','En Proceso','Sin dato'],
        datasets:[{ data:[bajo,proceso,nd],
          backgroundColor:['rgba(32,164,121,0.8)','rgba(243,107,33,0.7)','rgba(255,255,255,0.15)'],
          borderWidth:0 }]},
      options:{ responsive:true, plugins:{ legend:{ position:'bottom', labels:{color:'rgba(255,255,255,0.7)',font:{size:10},boxWidth:10} } } }
    });
  }

  // ---- Chart: DIEP por año ----
  if($('chartDiepAnio')){
    const byYear={2023:0,2024:0,2025:0,2026:0};
    DIEP_DATA.forEach(d=>{ const y=parseInt(d.fecha); if(byYear[y]!==undefined) byYear[y]++; });
    mkChart('chartDiepAnio',{type:'bar',
      data:{labels:Object.keys(byYear), datasets:[{label:'DIEP', data:Object.values(byYear),
        backgroundColor:'rgba(11,77,162,0.7)',borderRadius:5}]},
      options:{responsive:true,plugins:{legend:{display:false}},
        scales:{y:{ticks:{color:'rgba(255,255,255,0.5)',font:{size:9}},grid:{color:'rgba(255,255,255,0.07)'}},
          x:{ticks:{color:'rgba(255,255,255,0.6)',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'}}}
      }
    });
  }

  // ---- Chart: Diagnóstico ----
  if($('chartDiag')){
    const diagCounts={};
    dps.forEach(d=>diagCounts[d.diag]=(diagCounts[d.diag]||0)+1);
    const sorted=Object.entries(diagCounts).sort((a,b)=>b[1]-a[1]).slice(0,7);
    mkChart('chartDiag',{type:'bar',
      data:{labels:sorted.map(x=>x[0].replace('Trastornos de ','Trast. ')), datasets:[{data:sorted.map(x=>x[1]),
        backgroundColor:'rgba(91,42,134,0.7)',borderRadius:4}]},
      options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},
        scales:{x:{ticks:{color:'rgba(255,255,255,0.5)',font:{size:9}},grid:{color:'rgba(255,255,255,0.07)'}},
          y:{ticks:{color:'rgba(255,255,255,0.6)',font:{size:9}},grid:{color:'rgba(255,255,255,0.05)'}}}}
    });
  }

  // ---- Chart: Género ----
  if($('chartGen')){
    const M=dps.filter(d=>d.gen==='M').length, F=dps.filter(d=>d.gen==='F').length, nd=dps.filter(d=>!d.gen).length;
    mkChart('chartGen',{type:'doughnut',
      data:{labels:['Masculino','Femenino','Sin dato'],
        datasets:[{data:[M,F,nd], backgroundColor:['rgba(11,77,162,0.8)','rgba(243,107,33,0.8)','rgba(255,255,255,0.15)'], borderWidth:0}]},
      options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'rgba(255,255,255,0.7)',font:{size:10},boxWidth:10}}}}
    });
  }

  // ---- Chart: Tendencia participación ----
  if($('chartTend')){
    const centrosTrend = ['Mujica','Lo Espejo'];
    const datasets = centrosTrend.map((name,i)=>{
      const evs = CEAL_HISTORY.filter(h=>h.centro===name).sort((a,b)=>a.eval_n-b.eval_n);
      return { label:name, data:evs.map(e=>e.part), borderColor:['rgba(11,77,162,1)','rgba(243,107,33,1)'][i],
        backgroundColor:['rgba(11,77,162,0.1)','rgba(243,107,33,0.1)'][i], fill:true, tension:0.3,
        pointBackgroundColor:['#0B4DA2','#F36B21'][i], pointRadius:5 };
    });
    const allDates=['Eval 1 (2023)','Eval 2 (2025)'];
    mkChart('chartTend',{type:'line',
      data:{labels:allDates, datasets},
      options:{responsive:true, scales:{
        y:{min:40,max:85, ticks:{color:'rgba(255,255,255,0.5)',font:{size:10},callback:v=>v+'%'}, grid:{color:'rgba(255,255,255,0.07)'}},
        x:{ticks:{color:'rgba(255,255,255,0.6)',font:{size:10}}, grid:{color:'rgba(255,255,255,0.05)'}}},
        plugins:{legend:{labels:{color:'rgba(255,255,255,0.8)',font:{size:11}}}}
      }
    });
  }

  // ---- Chart: DIEP por año (comparativa) ----
  if($('chartDiepYear')){
    const byY={2023:0,2024:0,2025:0,2026:0};
    dps.forEach(d=>{ const y=parseInt(d.fecha); if(byY[y]!==undefined) byY[y]++; });
    mkChart('chartDiepYear',{type:'bar',
      data:{labels:Object.keys(byY), datasets:[{label:'DIEP', data:Object.values(byY),
        backgroundColor:['rgba(91,42,134,0.7)','rgba(214,40,40,0.7)','rgba(243,107,33,0.7)','rgba(245,179,1,0.7)'],
        borderRadius:6}]},
      options:{responsive:true,plugins:{legend:{display:false}},
        scales:{y:{ticks:{color:'rgba(255,255,255,0.5)',font:{size:10}},grid:{color:'rgba(255,255,255,0.07)'}},
          x:{ticks:{color:'rgba(255,255,255,0.6)',font:{size:11}},grid:{color:'rgba(255,255,255,0.05)'}}}}
    });
  }

  // ---- Chart: DIEP por RS (comparativa) ----
  if($('chartDiepRS')){
    const rsCount={voy4:0,voy14:0,voy15:0};
    DIEP_DATA.forEach(d=>{ if(rsCount[d.rs]!==undefined) rsCount[d.rs]++; });
    mkChart('chartDiepRS',{type:'doughnut',
      data:{labels:['VOY SpA','VOY 14','VOY 15'], datasets:[{
        data:[rsCount.voy4, rsCount.voy14, rsCount.voy15],
        backgroundColor:['rgba(11,77,162,0.8)','rgba(243,107,33,0.8)','rgba(91,42,134,0.8)'],
        borderWidth:0}]},
      options:{responsive:true,plugins:{legend:{position:'right',labels:{color:'rgba(255,255,255,0.7)',font:{size:11},boxWidth:12}}}}
    });
  }

  // ---- Chart: Evolución Mujica ----
  if($('chartEvol')){
    initEvolChart('Mujica','chartEvol');
  }

  // ---- Chart: Evolución Lo Espejo ----
  if($('chartEvolLE')){
    initEvolChart('Lo Espejo','chartEvolLE');
  }

  // ---- Radar CEAL (si existe) ----
  if($('chartRadar')){
    const firstKey = Object.keys(CEAL_DIMS)[0];
    initRadarChart(firstKey);
  }
}

function initEvolChart(centro, canvasId){
  const key1 = Object.keys(CEAL_DIMS).find(k=>k.includes(centro.replace(' ','_')||centro)&&k.includes('2023'));
  const key2 = Object.keys(CEAL_DIMS).find(k=>k.includes(centro.replace(' ','_')||centro)&&k.includes('2025'));
  if(!key1||!key2) return;
  const dims = ['CT','EM','DP','RC','CR','QL','CM','IT','TV','CJ','VU','VA'];
  const d1 = CEAL_DIMS[key1].dims, d2 = CEAL_DIMS[key2].dims;
  mkChart(canvasId,{type:'bar',
    data:{labels:dims,
      datasets:[
        {label:'2023 (% alto)', data:dims.map(d=>{ const x=d1.find(v=>v.d===d); return x?x.a:0; }), backgroundColor:'rgba(11,77,162,0.7)',borderRadius:4},
        {label:'2025 (% alto)', data:dims.map(d=>{ const x=d2.find(v=>v.d===d); return x?x.a:0; }), backgroundColor:'rgba(243,107,33,0.7)',borderRadius:4}
      ]},
    options:{responsive:true,
      scales:{y:{min:0,ticks:{color:'rgba(255,255,255,0.5)',font:{size:9},callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.07)'}},
        x:{ticks:{color:'rgba(255,255,255,0.6)',font:{size:9.5}},grid:{color:'rgba(255,255,255,0.05)'}}},
      plugins:{legend:{labels:{color:'rgba(255,255,255,0.8)',font:{size:10}}}}
    }
  });
}

function initRadarChart(key){
  const ev = CEAL_DIMS[key];
  if(!ev) return;
  const dims = ['CT','EM','DP','RC','CR','QL','CM','IT','TV','CJ','VU','VA','GHQ'];
  const dataAlto = dims.map(d=>{ const x=ev.dims.find(v=>v.d===d); return x?x.a:0; });
  const dataMedio = dims.map(d=>{ const x=ev.dims.find(v=>v.d===d); return x?x.m:0; });
  mkChart('chartRadar',{type:'radar',
    data:{labels:dims, datasets:[
      {label:'% Riesgo Alto', data:dataAlto, fill:true, backgroundColor:'rgba(214,40,40,0.25)', borderColor:'rgba(214,40,40,0.8)', borderWidth:2, pointRadius:4, pointBackgroundColor:'rgba(214,40,40,0.9)'},
      {label:'% Riesgo Medio', data:dataMedio, fill:true, backgroundColor:'rgba(245,179,1,0.15)', borderColor:'rgba(245,179,1,0.6)', borderWidth:1.5, pointRadius:3}
    ]},
    options:{responsive:true,
      scales:{r:{min:0,max:55, ticks:{color:'rgba(255,255,255,0.35)',font:{size:8},stepSize:10},
        grid:{color:'rgba(255,255,255,0.1)'}, pointLabels:{color:'rgba(255,255,255,0.75)',font:{size:10}} }},
      plugins:{legend:{labels:{color:'rgba(255,255,255,0.8)',font:{size:10}}}}
    }
  });
  const ev2 = CEAL_DIMS[key];
  $('radarInfo').textContent = `${key.replace('_',' ')} · N=${ev2.n} · Participación: ${ev2.part}% · ${fmtDate(ev2.fecha)}`;
}

function selectRadar(key){
  document.querySelectorAll('#radarTabs .inner-tab').forEach(t=>t.classList.toggle('active',t.dataset.key===key));
  initRadarChart(key);
}

/* ===================================================
   THEME, FILTERS, INIT
=================================================== */
function toggleTheme(){
  document.body.dataset.theme = document.body.dataset.theme==='light'?'':'light';
}

// Set date
function initDate(){
  $('sideDate').textContent = 'Actualizado: ' + new Date().toLocaleDateString('es-CL',{day:'2-digit',month:'long',year:'numeric'});
}

// Nav
document.querySelectorAll('#nav button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('#nav button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    state.view = b.dataset.view;
    render();
  });
});

// RS Filter chips
document.querySelectorAll('#filterRS .chip').forEach(ch=>{
  ch.addEventListener('click',()=>{
    document.querySelectorAll('#filterRS .chip').forEach(x=>x.classList.remove('active'));
    ch.classList.add('active');
    state.rsFilter = ch.dataset.rs;
    render();
  });
});

// Drawer close
$('drawerClose').addEventListener('click',()=>$('drawer').classList.remove('open'));
$('drawer').addEventListener('click', e=>{ if(e.target===$('drawer')) $('drawer').classList.remove('open'); });
// Close on overlay click
document.addEventListener('click', e=>{
  if(!$('drawer').contains(e.target)&&$('drawer').classList.contains('open')&&!e.target.closest('tr')&&!e.target.closest('[onclick]')){
    // Don't auto-close, user must click close button
  }
});

initDate();
render();
</script>
